services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    environment:
      - REDIS_URL=redis://redis:6379/0
      - OUTPUT_DIR=/data/outputs
    volumes:
      - ./data:/data
    ports:
      - "8000:8000"
    depends_on:
      - redis

  worker:
    build: .
    environment:
      - REDIS_URL=redis://redis:6379/0
      - OUTPUT_DIR=/data/outputs
    volumes:
      - ./data:/data
    depends_on:
      - redis
    command: ["python3", "-m", "rq", "worker", "-u", "redis://redis:6379/0", "transcribe"]

